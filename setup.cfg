[flake8]
exclude=env*,.tox,.git,*.egg,build,docs

[tool:pytest]
testpaths = tests
addopts = --cov=dtool_cli --cov-report=term-missing

[coverage:run]
source = dtool_cli

[coverage:report]
# Lines that are version-gated or only reachable when an optional package is
# (un)installed; covered across the full test matrix rather than any single run.
exclude_lines =
    pragma: no cover
    except ImportError
